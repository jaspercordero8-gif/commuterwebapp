<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrbanNav</title>

  <!-- Poppins font for hero title -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">

  <!-- Homepage styles -->
  <link rel="stylesheet" href="home.css">

  <style>
    html {
      font-size: 14px;
      transition: font-size 0.2s ease;
    }

    /* Override content font sizes to rem */
    .nav-brand-name    { font-size: 1.57rem; }
    .nav-login-btn     { font-size: 1.07rem; }
    .hero-title        { font-size: clamp(2.29rem, 6vw, 4.14rem); }
    .search-card-label { font-size: 0.93rem; }
    .search-input      { font-size: 1.07rem; }
    .time-label        { font-size: 1.07rem; }
    .time-input        { font-size: 1rem;    }
    .go-btn            { font-size: 1.14rem; }
    .home-error        { font-size: 0.93rem; }
    .tagline           { font-size: 0.93rem; }
    .auth-tab          { font-size: 0.93rem; }
    .auth-field label  { font-size: 0.86rem; }
    .auth-input        { font-size: 0.93rem; }
    .auth-submit-btn   { font-size: 1rem;    }
    .auth-switch       { font-size: 0.86rem; }
    .auth-error        { font-size: 0.86rem; }
    .modal-close-btn   { font-size: 1rem;    }

    /* Logged-in state */
    .home-user-label {
      color: white;
      font-size: 0.93rem;
      font-weight: 600;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0.92;
    }

    .home-logout-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.12);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s;
      flex-shrink: 0;
    }
    .home-logout-btn:hover  { background: rgba(239,68,68,0.35); }
    .home-logout-btn:active { transform: scale(0.93); }
    .home-logout-btn svg    { width: 18px; height: 18px; }
  </style>
</head>
<body>

  <!-- ── TOP NAV ── -->
  <header class="top-nav">
    <div class="nav-left">

      <div class="nav-logo-circle">
        <img src="logo.png" alt="UrbanNav logo" class="nav-logo-img"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <svg viewBox="0 0 48 48" fill="none" width="36" height="36" style="display:none">
          <circle cx="24" cy="24" r="22" fill="#1E40AF"/>
          <path d="M24 8C17.4 8 12 13.4 12 20c0 10.5 12 24 12 24s12-13.5 12-24c0-6.6-5.4-12-12-12z" fill="#60A5FA"/>
          <circle cx="24" cy="20" r="4" fill="white"/>
          <rect x="10" y="36" width="28" height="4" rx="2" fill="#93C5FD"/>
        </svg>
      </div>

      <span class="nav-brand-name">UrbanNav</span>

    </div>

    <div class="nav-right">
      <button class="night-btn" id="nightBtn" title="Toggle dark mode">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button class="nav-login-btn" id="loginBtn">Log in</button>
      <span id="homeUserLabel" class="home-user-label" style="display:none"></span>
      <button id="homeLogoutBtn" class="home-logout-btn" style="display:none"
              title="Log out" onclick="homeLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── MAIN CONTENT ── -->
  <main class="page">
    <h1 class="hero-title">Where are you going?</h1>

    <div class="search-card">
      <div class="inputs-wrapper">

        <div class="labeled-input">
          <span class="input-dot dot-green"></span>
          <div class="input-col">
            <p class="search-card-label">Start</p>
            <input id="homeFrom" type="text" class="search-input"
                   placeholder="Enter start location..." autocomplete="off">
          </div>
        </div>

        <div class="input-connector-line"></div>

        <div class="labeled-input">
          <span class="input-dot dot-red"></span>
          <div class="input-col">
            <p class="search-card-label">End</p>
            <input id="homeTo" type="text" class="search-input"
                   placeholder="Enter destination..." autocomplete="off">
          </div>
        </div>

      </div>

      <div class="time-row">
        <div class="time-label-group">
          <span class="time-label">Time:</span>
          <input type="time" id="homeTime" class="time-input">
        </div>
        <button class="go-btn" id="goBtn">GO</button>
      </div>
    </div>

    <p class="home-error" id="homeError"></p>
    <p class="tagline">Free to use &middot; No account needed to plan routes</p>
  </main>

  <!-- ── AUTH MODAL ── -->
  <div id="authModal" class="modal-overlay" style="display:none"
       onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <button class="modal-close-btn" onclick="closeModal()">&#x2715;</button>

      <div class="auth-tabs">
        <button id="tabLogin"    class="auth-tab auth-tab-active" onclick="switchTab('login')">Log In</button>
        <button id="tabRegister" class="auth-tab"                 onclick="switchTab('register')">Register</button>
      </div>

      <p id="authError" class="auth-error"></p>

      <div id="loginForm">
        <div class="auth-field">
          <label>Email</label>
          <input id="loginEmail" type="email" placeholder="you@example.com" class="auth-input">
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input id="loginPassword" type="password" placeholder="password" class="auth-input">
        </div>
        <button class="auth-submit-btn" onclick="submitLogin()">Log In</button>
        <p class="auth-switch">No account? <a href="#" onclick="switchTab('register')">Register here</a></p>
      </div>

      <div id="registerForm" style="display:none">
        <div class="auth-field-row">
          <div class="auth-field">
            <label>First Name</label>
            <input id="regFirst" type="text" placeholder="Jane" class="auth-input">
          </div>
          <div class="auth-field">
            <label>Last Name</label>
            <input id="regLast" type="text" placeholder="Smith" class="auth-input">
          </div>
        </div>
        <div class="auth-field">
          <label>Email</label>
          <input id="regEmail" type="email" placeholder="you@example.com" class="auth-input">
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input id="regPassword" type="password" placeholder="min 6 chars" class="auth-input">
        </div>
        <button class="auth-submit-btn" onclick="submitRegister()">Create Account</button>
        <p class="auth-switch">Have an account? <a href="#" onclick="switchTab('login')">Log in</a></p>
      </div>
    </div>
  </div>

  <!-- ── SCRIPTS ── -->
  <script src="config.js"></script>
  <script src="home.js"></script>

  <script>
    window.addEventListener('DOMContentLoaded', function () {
      homeUpdateAuthUI();
    });

    function homeUpdateAuthUI() {
      var raw       = sessionStorage.getItem('urbannav_user');
      var user      = raw ? JSON.parse(raw) : null;
      var loginBtn  = document.getElementById('loginBtn');
      var userLabel = document.getElementById('homeUserLabel');
      var logoutBtn = document.getElementById('homeLogoutBtn');
      if (!loginBtn) return;

      if (user) {
        loginBtn.style.display  = 'none';
        userLabel.style.display = 'inline-block';
        logoutBtn.style.display = 'inline-flex';
        userLabel.textContent   = user.first_name;
      } else {
        loginBtn.style.display  = 'inline-block';
        userLabel.style.display = 'none';
        logoutBtn.style.display = 'none';
      }
    }

    function homeLogout() {
      sessionStorage.removeItem('urbannav_user');
      homeUpdateAuthUI();
    }
  </script>

</body>
</html>
